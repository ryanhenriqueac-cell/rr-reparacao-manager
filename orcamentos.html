<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamentos | RR Reparação Manager</title>
  <link rel="icon" type="image/png" href="assets/logo-rr.png">
  <link rel="stylesheet" href="style.css?v=40">
</head>
<body data-page="orcamentos">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="dashboard.html"><img class="brand-logo" src="assets/logo-rr.png" alt="RR Reparação Automotiva"><span><strong>RR Reparação</strong><small>Manager</small></span></a>
      <nav class="nav-menu" aria-label="Menu principal">
        <a href="dashboard.html" data-nav="dashboard">Dashboard</a>
        <a href="clientes.html" data-nav="clientes">Clientes</a>
        <a href="orcamentos.html" data-nav="orcamentos">Orçamentos</a>
        <a href="financeiro.html" data-nav="financeiro">Financeiro</a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="topbar"><div><p class="eyebrow">Comercial</p><h1>Orçamentos</h1></div></header>
      <section class="form-panel">
        <form id="orcamentoForm" class="form-grid">
          <input type="hidden" id="orcamentoId">
          <label>Cliente<select id="orcamentoCliente" required></select></label>
          <label>Carro<select id="orcamentoCarro" required></select></label>
          <label>Data<input id="orcamentoData" type="date" required></label>
          <label>Status<input value="Pré-orçamento" disabled></label>
          <div class="span-2 nested-section">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Materiais</p>
                <h2>Peças</h2>
              </div>
              <button class="btn btn-ghost" type="button" id="addPeca">Adicionar peça</button>
            </div>
            <div id="orcamentoPecasLista" class="nested-list"></div>
          </div>
          <div class="span-2 nested-section">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Mão de obra</p>
                <h2>Serviços</h2>
              </div>
              <button class="btn btn-ghost" type="button" id="addServicoOrcamento">Adicionar serviço</button>
            </div>
            <div id="orcamentoServicosLista" class="nested-list"></div>
          </div>
          <div class="span-2 totals-box">
            <span>Peças: <strong id="totalPecasPreview">R$ 0,00</strong></span>
            <span>Custo peças: <strong id="totalCustoPecasPreview">R$ 0,00</strong></span>
            <span>Serviços: <strong id="totalServicosPreview">R$ 0,00</strong></span>
            <span>Total: <strong id="totalOrcamentoPreview">R$ 0,00</strong></span>
            <span>Lucro estimado: <strong id="lucroOrcamentoPreview">R$ 0,00</strong></span>
          </div>
          <label class="span-2">Valor final manual
            <input id="orcamentoValorFinal" type="number" min="0" step="0.01" placeholder="Opcional: se preencher, este valor prevalece no orçamento">
          </label>
          <div class="form-actions span-2">
            <button class="btn btn-primary" type="submit">Salvar orçamento</button>
            <button class="btn btn-muted" type="button" data-clear-form="orcamentoForm">Limpar</button>
          </div>
        </form>
      </section>
      <section class="panel">
        <div class="panel-header"><div><p class="eyebrow">Propostas</p><h2>Orçamentos emitidos</h2></div><input class="search-input" id="buscaOrcamentos" placeholder="Buscar orçamento"></div>
        <div class="table-wrap"><table><thead><tr><th>Número</th><th>Cliente</th><th>Carro</th><th>Status</th><th>Total</th><th>Data</th><th>Ações</th></tr></thead><tbody id="orcamentosTabela"></tbody></table></div>
      </section>
    </main>
  </div>
  <script src="script.js?v=39"></script>
  <script src="firebase-config.js?v=13"></script>
  <script type="module" src="firebase-sync.js?v=25"></script>
</body>
</html>
